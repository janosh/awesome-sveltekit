name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install deps
        run: npm install
        working-directory: site

      - name: Run prek
        uses: j178/prek-action@v2
