name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install deps
        # --ignore-scripts skips puppeteer/sharp build scripts (not needed for
        # lint) which pnpm otherwise gates behind interactive approval
        run: corepack enable && pnpm install --ignore-scripts
        working-directory: site

      - name: Run prek
        uses: j178/prek-action@v2
